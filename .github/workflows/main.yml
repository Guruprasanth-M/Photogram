name: Photogram CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # 1. PHP Syntax Lint
  # ─────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run PHP lint check
        run: |
          echo "Running PHP syntax validation..."
          ERROR=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERROR=1
            fi
          done < <(find . -name "*.php" ! -path "./vendor/*" ! -path "./project/npm-scripts/*" -print0)
          if [ "$ERROR" -eq 1 ]; then
            echo " PHP lint failed"
            exit 1
          fi
          echo " PHP lint passed"

  # ─────────────────────────────────────────────
  # 2. Docker Build + Smoke Test
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start containers
        run: |
          cp .env.example .env
          docker compose up -d --build

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app container to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' photogram_app 2>/dev/null || echo "not_found")
            echo "  [$i/30] app status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo " App container is healthy"
              break
            fi
            if [ "$STATUS" = "not_found" ] || [ "$STATUS" = "exited" ]; then
              echo " App container failed to start"
              docker compose logs app
              exit 1
            fi
            sleep 5
          done

          # Final health check via HTTP
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8120)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo " Smoke test failed: expected 200, got $STATUS"
            docker compose logs app
            exit 1
          fi
          echo " Smoke test passed (HTTP $STATUS)"

      - name: Collect Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # 3. Push image to Docker Hub
  # ─────────────────────────────────────────────
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            guruprasanth1/photogram:latest
            guruprasanth1/photogram:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. Self-hosted deploy (existing Azure VM)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: self-hosted
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application files
        run: |
          echo "Deploying application..."

          rm -rf /home/azureuser/htdocs/photogram
          mkdir -p /home/azureuser/htdocs/photogram
          cp -r "$(pwd)"/* /home/azureuser/htdocs/photogram/

          # Remove dev-only files
          rm -rf /home/azureuser/htdocs/photogram/.git
          rm -rf /home/azureuser/htdocs/photogram/README.md
          rm -rf /home/azureuser/htdocs/photogram/.github
          rm -rf /home/azureuser/htdocs/photogram/project/npm-scripts
          rm -f  /home/azureuser/htdocs/photogram/composer.json
          rm -f  /home/azureuser/htdocs/photogram/htdocs/.gitignore

          # Restore production config
          cp /home/azureuser/photogramconfig.json \
             /home/azureuser/htdocs/photogram/project/ 2>/dev/null || true

          echo "Deployment complete"