; ============================================================
; Photogram PHP settings (injected inside Docker container)
; ============================================================

; Upload limits
upload_max_filesize = 50M
post_max_size       = 55M
max_execution_time  = 120
memory_limit        = 256M

; Error display (off in production; errors go to Apache log)
display_errors     = Off
log_errors         = On
error_reporting    = E_ALL & ~E_DEPRECATED & ~E_NOTICE

; Session
session.cookie_httponly = 1
session.use_strict_mode = 1

; Timezone
date.timezone = UTC
